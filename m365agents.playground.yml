# yaml-language-server: $schema=https://aka.ms/m365-agents-toolkits/v1.11/yaml.schema.json
# Visit https://aka.ms/teamsfx-v5.0-guide for details on this file
# Visit https://aka.ms/teamsfx-actions for details on actions
version: v1.11

environmentFolderPath: ./env

deploy:
  # Install development tool(s)
  - uses: devTool/install
    with:
      testTool:
        version: ~0.2.7
        symlinkDir: ./devTools/playground
      nodejs:
        symlinkDir: ./devTools/nodejs

  # Install Python dependencies
  - uses: script
    with:
      run: uv pip install -e .

  - uses: file/createOrUpdateEnvironmentFile
    with:
      target: ./.env
      envs:
        PORT: 3978
        TEAMSFX_NOTIFICATION_STORE_FILENAME: ${{TEAMSFX_NOTIFICATION_STORE_FILENAME}}
        AZURE_OPENAI_API_KEY: ${{SECRET_AZURE_OPENAI_API_KEY}}
        AZURE_OPENAI_ENDPOINT: ${{AZURE_OPENAI_ENDPOINT}}
        AZURE_OPENAI_DEPLOYMENT: ${{AZURE_OPENAI_DEPLOYMENT_NAME}}
        AZURE_OPENAI_API_VERSION: ${{AZURE_OPENAI_API_VERSION}}
        # OPENAI_API_KEY: ${{SECRET_OPENAI_API_KEY}}
        BEARER_TOKEN: ${{SECRET_BEARER_TOKEN}}
        USE_AGENTIC_AUTH: ${{USE_AGENTIC_AUTH}}
        CONNECTIONSMAP__0__SERVICEURL: ${{connectionsMap__0__serviceUrl}}
        CONNECTIONSMAP__0__CONNECTION: SERVICE_CONNECTION
        AGENTAPPLICATION__USERAUTHORIZATION__HANDLERS__AGENTIC__SETTINGS__TYPE: ${{agentic_type}}
        AGENTAPPLICATION__USERAUTHORIZATION__HANDLERS__AGENTIC__SETTINGS__ALTERNATEBLUEPRINTCONNECTIONNAME: SERVICE_CONNECTION
        AGENTAPPLICATION__USERAUTHORIZATION__HANDLERS__AGENTIC__SETTINGS__SCOPES: ${{agentic_scopes}}
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTID: ""
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTSECRET: ""
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__TENANTID: ""
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__SCOPES: https://graph.microsoft.com/.default
